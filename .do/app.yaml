# DigitalOcean App Platform spec — one app, two components, one domain.
#   /api  + /ws  -> FastAPI backend (path prefix preserved)
#   /            -> Next.js frontend
# Create:  doctl apps create --spec .do/app.yaml
# Update:  doctl apps update <APP_ID> --spec .do/app.yaml
name: frtc-fraud-investigator
region: nyc

services:
  # ── Backend: FastAPI + WebSocket. Heavy tree (cognee/fastembed/lancedb/kuzu),
  #    so we build from a Dockerfile rather than the Python buildpack. ──
  - name: api
    github:
      repo: ht-epistolist/67hack
      branch: main
      deploy_on_push: true
    dockerfile_path: backend/Dockerfile
    source_dir: /
    http_port: 8080
    instance_count: 1
    # 2 GB is the practical floor (onnxruntime + lancedb + kuzu + the embedding
    # model in memory). Bump to apps-d-1vcpu-4gb if you hit OOM.
    instance_size_slug: apps-s-1vcpu-2gb
    health_check:
      http_path: /api/health
    routes:
      - path: /api
        preserve_path_prefix: true
      - path: /ws
        preserve_path_prefix: true
    envs:
      - key: OPENROUTER_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME            # set the real key in the dashboard / via doctl
      - key: AGENT_MODEL
        scope: RUN_TIME
        value: google/gemini-2.5-flash
      - key: REASONING_MODEL
        scope: RUN_TIME
        value: google/gemini-2.5-pro
      - key: COGNEE_LLM_MODEL
        scope: RUN_TIME
        value: openrouter/google/gemini-2.5-flash
      - key: EMBEDDING_MODEL
        scope: RUN_TIME
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: EMBEDDING_DIMENSIONS
        scope: RUN_TIME
        value: "384"

  # ── Frontend: Next.js 16 via the Node buildpack. ──
  - name: web
    github:
      repo: ht-epistolist/67hack
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    routes:
      - path: /
    envs:
      # NEXT_PUBLIC_* is inlined at BUILD time. ${APP_URL} is the app's own
      # public URL, so the browser talks same-origin to /api and /ws.
      - key: NEXT_PUBLIC_API_URL
        scope: BUILD_TIME
        value: ${APP_URL}
