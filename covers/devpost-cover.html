<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap");

      :root {
        --paper: #faf8f3;
        --paper2: #efe9de;
        --ink2: #a89a87;
        --clay: #d8584a; /* source — escalate red, brightened for dark */
        --amber: #f0a93a; /* relay — highest risk */
        --sage: #86a894; /* sink */
        --gold: #e8a23d;
        --dim: #5b5046;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 675px;
        overflow: hidden;
      }
      .stage {
        position: relative;
        width: 1200px;
        height: 675px;
        background:
          radial-gradient(
            120% 120% at 78% 28%,
            rgba(232, 162, 61, 0.1),
            transparent 55%
          ),
          radial-gradient(
            100% 100% at 18% 95%,
            rgba(216, 88, 74, 0.08),
            transparent 50%
          ),
          radial-gradient(
            140% 140% at 50% 0%,
            #211a15 0%,
            #16110d 45%,
            #0c0907 100%
          );
        color: var(--paper);
        font-family: "Newsreader", Georgia, serif;
        overflow: hidden;
      }
      /* subtle paper grain via repeating hairlines */
      .stage::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.014) 0 1px,
          transparent 1px 3px
        );
        mix-blend-mode: overlay;
        opacity: 0.5;
      }
      .frame {
        position: absolute;
        inset: 26px;
        border: 1px solid rgba(232, 162, 61, 0.16);
        border-radius: 4px;
        pointer-events: none;
      }

      .wordmark {
        position: absolute;
        left: 56px;
        top: 52px;
        display: flex;
        align-items: center;
        gap: 13px;
        z-index: 5;
      }
      .glyph {
        width: 26px;
        height: 26px;
      }
      .wordmark .name {
        font-family: "IBM Plex Mono", monospace;
        font-weight: 600;
        letter-spacing: 0.34em;
        font-size: 17px;
        color: var(--paper);
      }
      .wordmark .name b {
        color: var(--amber);
      }

      .pill {
        position: absolute;
        right: 56px;
        top: 50px;
        z-index: 5;
        display: flex;
        align-items: center;
        gap: 9px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.16em;
        color: #f3c9c3;
        background: rgba(216, 88, 74, 0.12);
        border: 1px solid rgba(216, 88, 74, 0.5);
        padding: 8px 15px;
        border-radius: 999px;
      }
      .pill .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--clay);
        box-shadow: 0 0 12px 2px rgba(216, 88, 74, 0.8);
      }

      /* graph */
      .graph {
        position: absolute;
        right: 38px;
        top: 96px;
        width: 660px;
        height: 392px;
        z-index: 2;
      }

      /* copy block */
      .copy {
        position: absolute;
        left: 58px;
        bottom: 72px;
        z-index: 4;
        max-width: 680px;
      }
      .kicker {
        font-family: "IBM Plex Mono", monospace;
        font-size: 12.5px;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        color: var(--ink2);
        margin-bottom: 18px;
      }
      h1 {
        font-weight: 500;
        font-size: 55px;
        line-height: 1.04;
        letter-spacing: -0.012em;
        color: var(--paper);
      }
      h1 .accent {
        color: var(--gold);
        font-style: italic;
        font-weight: 600;
      }
      .stats {
        margin-top: 26px;
        display: flex;
        align-items: center;
        gap: 18px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        color: #d8cdbb;
      }
      .stats .big {
        color: var(--amber);
        font-weight: 600;
        font-size: 15px;
      }
      .stats .sep {
        color: var(--dim);
      }

      .foot {
        position: absolute;
        right: 56px;
        bottom: 40px;
        z-index: 5;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        letter-spacing: 0.12em;
        color: var(--ink2);
      }

      /* node label */
      .nlab {
        font-family: "IBM Plex Mono", monospace;
        font-size: 10.5px;
        font-weight: 500;
        fill: #cdbfac;
        letter-spacing: 0.02em;
      }
      .role {
        font-family: "IBM Plex Mono", monospace;
        font-size: 8.5px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="frame"></div>

      <div class="wordmark">
        <svg class="glyph" viewBox="0 0 26 26" fill="none">
          <circle cx="5" cy="6" r="2.4" fill="#D8584A" />
          <circle cx="13" cy="13" r="2.4" fill="#F0A93A" />
          <circle cx="21" cy="9" r="2.4" fill="#86A894" />
          <circle cx="20" cy="21" r="2.4" fill="#86A894" />
          <path
            d="M7 7.4 L11.2 11.6 M14.8 11.8 L19 9.6 M14.4 14.6 L18.4 19.6"
            stroke="#E8A23D"
            stroke-width="1.3"
            stroke-linecap="round"
          />
        </svg>
        <div class="name">F<b>R</b>TC</div>
      </div>

      <div class="pill"><span class="dot"></span>RING-001 · ESCALATE-SAR</div>

      <!-- money-path graph: real RING-001 structure -->
      <svg class="graph" viewBox="0 0 660 392" fill="none">
        <defs>
          <marker
            id="arrow"
            markerWidth="9"
            markerHeight="9"
            refX="7.5"
            refY="3.2"
            orient="auto"
          >
            <path d="M0 0 L7 3.2 L0 6.4 Z" fill="#E8A23D" />
          </marker>
          <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="5" result="b" />
            <feMerge>
              <feMergeNode in="b" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
          <radialGradient id="gClay">
            <stop offset="0%" stop-color="#F08274" />
            <stop offset="100%" stop-color="#C0392B" />
          </radialGradient>
          <radialGradient id="gAmber">
            <stop offset="0%" stop-color="#FFD27A" />
            <stop offset="100%" stop-color="#E0901F" />
          </radialGradient>
          <radialGradient id="gSage">
            <stop offset="0%" stop-color="#A9C6B5" />
            <stop offset="100%" stop-color="#6F9180" />
          </radialGradient>
        </defs>

        <!-- edges (drawn first, under nodes) -->
        <g
          stroke="#E8A23D"
          stroke-width="1.7"
          marker-end="url(#arrow)"
          opacity="0.62"
        >
          <!-- chain 2 -->
          <path d="M150 86 C 220 70, 270 58, 322 62" />
          <path d="M150 92 C 220 110, 268 132, 320 140" />
          <path d="M362 140 C 410 140, 452 140, 498 140" />
          <!-- chain 3 -->
          <path d="M150 232 L 320 232" />
          <path d="M362 232 L 498 232" />
          <!-- chain 1 -->
          <path d="M188 328 L 348 328" />
        </g>

        <!-- nodes -->
        <g filter="url(#glow)">
          <!-- chain 2: AC-0005 src -> AC-0006 sink ; AC-0005 -> AC-0009 relay -> AC-0007 sink -->
          <circle cx="138" cy="89" r="11" fill="url(#gClay)" />
          <circle cx="340" cy="60" r="9" fill="url(#gSage)" />
          <circle cx="340" cy="143" r="10" fill="url(#gAmber)" />
          <circle cx="510" cy="140" r="9" fill="url(#gSage)" />
          <!-- chain 3: AC-0010 src -> AC-0011 relay(top risk) -> AC-0003 sink -->
          <circle cx="138" cy="232" r="11" fill="url(#gClay)" />
          <circle cx="340" cy="232" r="13" fill="url(#gAmber)" />
          <circle cx="510" cy="232" r="9" fill="url(#gSage)" />
          <!-- chain 1: AC-0001 src -> AC-0002 sink -->
          <circle cx="176" cy="328" r="10" fill="url(#gClay)" />
          <circle cx="360" cy="328" r="9" fill="url(#gSage)" />
        </g>
        <!-- satellite AC-0012 (in ring, off the flow) -->
        <circle
          cx="560"
          cy="330"
          r="7"
          fill="none"
          stroke="#7a6c5c"
          stroke-width="1.6"
          stroke-dasharray="3 3"
        />

        <!-- labels -->
        <g class="nlab" text-anchor="middle">
          <text x="138" y="113">AC-0005</text>
          <text x="340" y="42">AC-0006</text>
          <text x="340" y="167">AC-0009</text>
          <text x="510" y="121">AC-0007</text>
          <text x="138" y="256">AC-0010</text>
          <text x="510" y="213">AC-0003</text>
          <text x="176" y="352">AC-0001</text>
          <text x="360" y="352">AC-0002</text>
          <text x="560" y="352" fill="#8a7c6a">AC-0012</text>
        </g>
        <text x="340" y="210" text-anchor="middle" class="role" fill="#F0A93A">
          relay · top risk
        </text>
        <text
          x="340"
          y="222"
          text-anchor="middle"
          class="nlab"
          fill="#FFD27A"
          style="font-size: 11px; font-weight: 600"
        >
          AC-0011
        </text>
      </svg>

      <div class="copy">
        <div class="kicker">Multi-agent fraud-ring triage</div>
        <h1>
          Four agents. One ranked case.<br /><span class="accent"
            >Three minutes.</span
          >
        </h1>
        <div class="stats">
          <span class="big">$161,750.90</span><span class="sep">/</span>
          <span>250 sub-threshold transfers</span><span class="sep">/</span>
          <span>10 accounts</span><span class="sep">/</span>
          <span>3 layering chains</span>
        </div>
      </div>

      <div class="foot">matches the answer key — to the cent</div>
    </div>
  </body>
</html>
